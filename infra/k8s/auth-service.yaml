apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: notes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        - name: migrate
          image: notes/auth-service:dev
          imagePullPolicy: Never
          command: ["sh", "-c", "cd /workspace/apps/auth-service && pnpm exec prisma migrate deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: notes-secrets
                  key: AUTH_DATABASE_URL
            - name: DIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: notes-secrets
                  key: AUTH_DIRECT_URL
      containers:
        - name: auth-service
          image: notes/auth-service:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 50051
          envFrom:
            - configMapRef:
                name: notes-config
          env:
            - name: GRPC_PORT
              value: "50051"
            - name: GRPC_TLS_ENABLED
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: notes-secrets
                  key: AUTH_DATABASE_URL
            - name: DIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: notes-secrets
                  key: AUTH_DIRECT_URL
            - name: RSA_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: notes-secrets
                  key: JWT_PRIVATE_KEY
            - name: RSA_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: notes-secrets
                  key: JWT_PUBLIC_KEY
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: notes
spec:
  selector:
    app: auth-service
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
  clusterIP: None
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: notes
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
