apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-service
  namespace: notes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notes-service
  template:
    metadata:
      labels:
        app: notes-service
    spec:
      initContainers:
        - name: migrate
          image: notes/notes-service:dev
          imagePullPolicy: Never
          command: ["sh", "-c", "cd /workspace/apps/notes-service && pnpm exec prisma migrate deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: notes-secrets
                  key: NOTES_DATABASE_URL
            - name: DIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: notes-secrets
                  key: NOTES_DIRECT_URL
      containers:
        - name: notes-service
          image: notes/notes-service:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 50052
          envFrom:
            - configMapRef:
                name: notes-config
          env:
            - name: GRPC_PORT
              value: "50052"
            - name: GRPC_TLS_ENABLED
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: notes-secrets
                  key: NOTES_DATABASE_URL
            - name: DIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: notes-secrets
                  key: NOTES_DIRECT_URL
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notes-service
  namespace: notes
spec:
  selector:
    app: notes-service
  ports:
    - name: grpc
      port: 50052
      targetPort: 50052
  clusterIP: None
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notes-service-hpa
  namespace: notes
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notes-service
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
