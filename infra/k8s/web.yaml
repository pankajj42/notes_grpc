apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: notes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: notes/web:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 5173
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: notes
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 5173
      targetPort: 5173
